<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starbucks Coffee Company</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="nav">
        <div class="nav-left">
            <div id="nav-logochange-layout">
                <div class="block-welcome">
                    <img src="logo.png" alt="">
                    <span class="first">Welcome to</span>
                    <span class="second">Starbugs</span>
                </div>
            </div>
            <img class="main-img" src="logo.png" alt="">
            <span>Home</span>
            <span>Gift</span>
            <span>Order</span>
            <span>Pay</span>
            <span>Store</span>
            <span>Corporate Gifting</span>
        </div>
        <div class="nav-right">
            <div class="input">
                <img src="Search.svg" alt="">
                <input type="text" placeholder="Looking for something special?">
            </div>
            <img class="hidden-search" src="Search.svg" alt="">
            <div class="Profile"><img src="Profile.svg" alt=""></div>
        </div>
    </div>
    <div id="nav-change-layout">
        <div class="nav-block-left">
            <span>Home</span>
            <span>Gift</span>
            <span>Order</span>
            <span>Pay</span>
            <span>Store</span>
            <span>Corporate Gifting</span>
        </div>
    </div>
    <div class="nav-footer">
        <div class="nav-footer-left">
            <span style="font-size: larger;" >✨</span>
            <span>Start in to</span>
            <span style="color: #C5962A; font-size: 13px;" >Earn Star</span>
            <span>on every Order</span>
        </div>
        <div class="nav-footer-right">
            <button>Know More</button>
        </div>
    </div>
</body>

</html>
