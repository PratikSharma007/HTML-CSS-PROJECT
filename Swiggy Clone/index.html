<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiggy</title>
    <link rel="stylesheet" href="style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Baloo+Bhai+2:wght@400..800&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

<body>
    <div class="header">
        <div class="nav">
            <img src="swiggy_logo_white.avif" alt="">
            <div class="menu">
                <a href="https://www.swiggy.com/corporate/">Swiggy Corporate</a>
                <a href="https://partner.swiggy.com/login#/swiggy">Partner with us </a>

        <div class="container">
            <h1>Order food & groceries. Discover best restaurants. Swiggy it!</h1>

                </div>
                <div class="restaurant">
                    <input placeholder="Search for restaurant,items or more" type="text">
                    <svg aria-hidden="true" height="20" width="20" class="sc-fFubTW bmcRAv"><use xlink:href="/core/sprite-n2wVr1Ar.svg#search20"></use></svg>

        </div>
        <div class="RightImg">
            <img src="Sushi_replace.avif" alt="">

    <div class="CARD">
        <img src="Card.img1.png" alt="img">
        <img src="Card.img2.png" alt="img">
        <img src="Card.img3.png" alt="img">
